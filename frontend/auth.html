<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora Promoções - Cadastro/Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="container mx-auto p-8">
    <h1 class="text-3xl font-bold mb-6 text-center">Monitora Promoções</h1>
    <div class="bg-white shadow rounded p-6">
      <form id="telegramLoginForm" class="flex flex-col gap-4">
        <input type="text" id="telegramNumber" placeholder="Número do Telegram (+55...)" class="border p-2 rounded">
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Entrar com Telegram</button>
      </form>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
