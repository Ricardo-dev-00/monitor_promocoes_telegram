<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora Promoções - Aplicação</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-100 via-white to-blue-200 min-h-screen">
  <nav class="bg-blue-700 text-white p-4 flex justify-between items-center shadow">
    <span class="font-bold text-xl">Monitora Promoções</span>
    <span class="text-sm" id="statusLogin">Usuário logado</span>
  </nav>
  <div class="container mx-auto mt-10 p-6 bg-white rounded-2xl shadow-2xl animate-fade-in">
    <h2 class="text-2xl font-bold mb-4 text-blue-700">Painel de Promoções</h2>
    <p class="mb-6 text-gray-600">Aqui você acompanha promoções e configura os produtos para monitorar nos seus grupos do Telegram.</p>
    <ul id="promocoes" class="mb-6 list-disc pl-6 text-gray-700"></ul>
    <button id="atualizar" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Atualizar Promoções</button>
    <div class="mt-10">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-lg font-semibold">Grupos de Promoções no Telegram</h3>
        <button id="atualizarGrupos" class="bg-indigo-500 text-white px-3 py-1 rounded hover:bg-indigo-600" type="button">Atualizar Grupos</button>
      </div>
      <ul id="gruposTelegram" class="mb-6 list-disc pl-6 text-gray-700"></ul>
    </div>

    <div class="mt-8 border-t pt-6">
      <h3 class="text-lg font-semibold mb-2">Cadastrar Produto para Monitoramento</h3>
      <form id="produtoForm" class="flex flex-col gap-2 max-w-md">
        <select id="grupoSelect" class="border rounded px-3 py-2" required>
          <option value="">Selecione um grupo</option>
        </select>
        <input id="produtoMonitorado" type="text" placeholder="Ex.: iPhone 15, Notebook Gamer" class="border rounded px-3 py-2" required>
        <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Cadastrar Produto</button>
      </form>
      <ul id="produtosMonitorados" class="mt-4 list-disc pl-6 text-gray-700"></ul>
    </div>
  </div>
  <script src="main.js"></script>
    <script>
      const appQueryParams = new URLSearchParams(window.location.search);
      const entrouPeloBotaoLogin = appQueryParams.get('fromLogin') === '1';
      const userGate = localStorage.getItem('telegramUser');
      if (!userGate && !entrouPeloBotaoLogin) {
        window.location.href = 'index.html';
      }

      // Função global para exibir mensagem estilizada de logout
      function exibirMensagemLogout() {
        let modal = document.createElement('div');
        modal.className = 'fixed inset-0 flex items-center justify-center z-50';
        modal.innerHTML = `
          <div class="bg-white rounded-2xl shadow-2xl p-8 text-center animate-fade-in border-2 border-red-500">
            <span class="inline-block bg-red-500 rounded-full p-4 mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </span>
            <h2 class="text-2xl font-bold text-red-600 mb-2">Você foi deslogado do Telegram!</h2>
            <p class="text-gray-600 mb-6">Faça login novamente para acessar o painel.</p>
            <button id="btnVoltarLogout" class="bg-blue-500 text-white px-6 py-2 rounded-lg shadow hover:bg-blue-600 transition">Voltar para página inicial</button>
          </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('btnVoltarLogout').addEventListener('click', function() {
          localStorage.removeItem('telegramUser');
          window.location.href = 'index.html';
        });
      }
      // Adiciona botão de logout no painel
      window.addEventListener('DOMContentLoaded', function() {
        const nav = document.querySelector('nav');
        if (nav) {
          const btnLogout = document.createElement('button');
          btnLogout.textContent = 'Deslogar';
          btnLogout.className = 'ml-4 bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600';
          btnLogout.onclick = () => {
            exibirMensagemLogout();
          };
          nav.appendChild(btnLogout);
        }
        // Ao abrir a página, verifica se está logado
        const user = localStorage.getItem('telegramUser');
        if (!user && !entrouPeloBotaoLogin) {
          window.location.href = 'index.html';
        }
      });
    </script>
  <style>
    .animate-fade-in {
      animation: fade-in 1s ease;
    }
    @keyframes fade-in {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</body>
</html>
